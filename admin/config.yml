backend:
  name: github
  repo: edisonchu115/mengtakhttpsg-website
  branch: main

media_folder: assets/images/products
public_folder: /assets/images/products

locale: 'zh_Hant'

collections:
  - name: "whisky"
    label: "威士忌"
    file: "products/whisky.json"
    fields:
      - name: products
        label: 威士忌產品列表
        widget: list
        fields:
          - {label: "英文名稱", name: "name_en", widget: "string"}
          - {label: "中文名稱", name: "name_zh", widget: "string"}
          - {label: "規格", name: "spec", widget: "string"}
          - {label: "酒精度", name: "abv", widget: "string"}
          - {label: "來源", name: "source", widget: "select", options: ["代理正貨","進口"]}
          - {label: "產品圖片", name: "image", widget: "image", required: false}
  - name: "cognac"
    label: "干邑/拔蘭地"
